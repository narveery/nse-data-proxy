name: Fetch NSE Data Daily

on:
  schedule:
    # 7:00 PM IST is 1:30 PM (13:30) UTC. Runs Monday through Friday.
    - cron: '30 13 * * 1-5' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run Script
        run: python fetch_nse.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add nse_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update NSE data"
          git push
