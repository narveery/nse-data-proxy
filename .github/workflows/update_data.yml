name: Fetch NSE Data Daily

on:
  schedule:
    # 7:12 PM IST is 1:42 PM (13:42) UTC. 
    # Shifted to an odd minute (:42) to completely bypass GitHub peak traffic queues.
    - cron: '42 13 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Upgraded to v7 for native Node 24 support
      - uses: actions/checkout@v7
      
      # Upgraded to v6 for native Node 24 support
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run Script
        run: python fetch_nse.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add nse_data.json
          
          # Only commit, pull, and push if changes actually exist
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto-update NSE data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
